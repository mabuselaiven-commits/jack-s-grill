<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Jack's Grill</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/login.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card glassmorphism reveal active">
      <div class="login-header">
        <div class="logo-icon has-image"><img src="/assets/images/logo.jpg" alt="Logo" referrerpolicy="no-referrer"></div>
        <h1 class="login-title">JACK'S <span class="text-gold">GRILL</span></h1>
        <p class="login-subtitle">Management System Login</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <i data-lucide="user" class="input-icon"></i>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
          </div>
        </div>

        <div id="errorMessage" class="error-message">
          <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
          <span id="errorText">Invalid username or password.</span>
        </div>

        <button type="submit" class="btn btn-primary login-btn">
          <i data-lucide="log-in" style="width: 18px; height: 18px;"></i>
          <span>Authenticate</span>
        </button>
      </form>
      
      <div class="login-footer">
        <a href="/index.html" class="back-link">
          <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i>
          <span>Return to Website</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
  <script src="/login.js"></script>
</body>
</html>
